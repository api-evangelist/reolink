naftiko: "1.0.0-alpha1"

info:
  label: "Reolink Camera HTTP API"
  description: >-
    The Reolink Camera HTTP API provides a JSON-based interface for controlling
    and configuring Reolink IP cameras and NVRs via HTTP POST requests to the
    /cgi-bin/api.cgi endpoint. Covers authentication, system management,
    network configuration, video and image settings, encoding, recording,
    PTZ control, alarm and motion detection, LED control, and AI object detection.
  tags:
    - IoT
    - Security Cameras
    - Surveillance
    - Smart Home
  created: "2026-05-02"
  modified: "2026-05-02"

binds:
  - namespace: env
    keys:
      REOLINK_USERNAME: REOLINK_USERNAME
      REOLINK_PASSWORD: REOLINK_PASSWORD
      REOLINK_CAMERA_IP: REOLINK_CAMERA_IP

capability:
  consumes:
    - type: http
      namespace: reolink
      baseUri: https://{REOLINK_CAMERA_IP}
      description: "Reolink camera local HTTP API"
      authentication:
        type: apikey
        key: token
        value: "{{REOLINK_TOKEN}}"
        placement: query
      resources:
        - name: authentication
          path: /cgi-bin/api.cgi
          description: "Camera authentication and session management"
          operations:
            - name: login
              method: POST
              description: "Authenticate and obtain a session token"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: array
                  value: "$."
              body:
                type: json
                data:
                  cmd: "Login"
                  action: 0
                  param:
                    User:
                      userName: "{{REOLINK_USERNAME}}"
                      password: "{{REOLINK_PASSWORD}}"
            - name: logout
              method: POST
              description: "End session and invalidate token"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: system
          path: /cgi-bin/api.cgi
          description: "Device information and system management"
          operations:
            - name: get-device-info
              method: POST
              description: "Get device information including model and firmware version"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  cmd: "GetDevInfo"
                  action: 0
                  param: {}
            - name: get-time
              method: POST
              description: "Get device date and time settings"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  cmd: "GetTime"
                  action: 0
                  param: {}
            - name: set-time
              method: POST
              description: "Set device date and time"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  cmd: "SetTime"
                  action: 0
                  param: "{{tools.timeParam}}"
            - name: reboot
              method: POST
              description: "Reboot the camera device"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  cmd: "Reboot"
                  action: 0
                  param: {}
            - name: get-hdd-info
              method: POST
              description: "Get storage drive information"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  cmd: "GetHddInfo"
                  action: 0
                  param: {}
            - name: get-channel-status
              method: POST
              description: "Get status of all camera channels"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  cmd: "GetChannelStatus"
                  action: 0
                  param: {}

        - name: ptz
          path: /cgi-bin/api.cgi
          description: "Pan-tilt-zoom control and presets"
          operations:
            - name: ptz-control
              method: POST
              description: "Control PTZ movement (pan, tilt, zoom)"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  cmd: "PtzCtrl"
                  action: 0
                  param:
                    channel: "{{tools.channel}}"
                    op: "{{tools.op}}"
                    speed: "{{tools.speed}}"
            - name: get-ptz-presets
              method: POST
              description: "Get configured PTZ preset positions"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  cmd: "GetPtzPreset"
                  action: 0
                  param:
                    channel: "{{tools.channel}}"
            - name: set-ptz-preset
              method: POST
              description: "Save current position as a named PTZ preset"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  cmd: "SetPtzPreset"
                  action: 0
                  param: "{{tools.presetParam}}"

        - name: recording
          path: /cgi-bin/api.cgi
          description: "Recording configuration and search"
          operations:
            - name: get-recording-settings
              method: POST
              description: "Get recording schedule and settings"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  cmd: "GetRec"
                  action: 0
                  param:
                    channel: "{{tools.channel}}"
            - name: search-recordings
              method: POST
              description: "Search recordings by date, time range, and channel"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  cmd: "Search"
                  action: 0
                  param:
                    Search:
                      channel: "{{tools.channel}}"
                      onlyStatus: 0
                      streamType: "main"
                      StartTime: "{{tools.startTime}}"
                      EndTime: "{{tools.endTime}}"

        - name: alarm
          path: /cgi-bin/api.cgi
          description: "Motion detection and alarm configuration"
          operations:
            - name: get-motion-alarm
              method: POST
              description: "Get motion detection alarm settings"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  cmd: "GetMdAlarm"
                  action: 0
                  param:
                    channel: "{{tools.channel}}"
            - name: set-motion-alarm
              method: POST
              description: "Configure motion detection alarm settings"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  cmd: "SetMdAlarm"
                  action: 0
                  param: "{{tools.alarmParam}}"

        - name: ai-detection
          path: /cgi-bin/api.cgi
          description: "AI-powered object detection"
          operations:
            - name: get-ai-state
              method: POST
              description: "Get AI detection state (person, vehicle, animal)"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  cmd: "GetAiState"
                  action: 0
                  param:
                    channel: "{{tools.channel}}"
            - name: get-ai-config
              method: POST
              description: "Get AI detection configuration"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  cmd: "GetAiCfg"
                  action: 0
                  param:
                    channel: "{{tools.channel}}"
            - name: set-ai-config
              method: POST
              description: "Configure AI detection parameters"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  cmd: "SetAiCfg"
                  action: 0
                  param: "{{tools.aiParam}}"
            - name: get-ai-alarm
              method: POST
              description: "Get AI alarm settings for object detection"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  cmd: "GetAiAlarm"
                  action: 0
                  param:
                    channel: "{{tools.channel}}"

        - name: video
          path: /cgi-bin/api.cgi
          description: "Video and image settings"
          operations:
            - name: get-image-settings
              method: POST
              description: "Get image quality settings"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  cmd: "GetImage"
                  action: 0
                  param:
                    channel: "{{tools.channel}}"
            - name: capture-snapshot
              method: POST
              description: "Capture a JPEG snapshot from the camera"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  cmd: "Snap"
                  action: 0
                  param:
                    channel: "{{tools.channel}}"

        - name: led
          path: /cgi-bin/api.cgi
          description: "IR and white light LED control"
          operations:
            - name: get-ir-lights
              method: POST
              description: "Get infrared LED settings"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  cmd: "GetIrLights"
                  action: 0
                  param:
                    channel: "{{tools.channel}}"
            - name: set-ir-lights
              method: POST
              description: "Configure infrared LED for night vision"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  cmd: "SetIrLights"
                  action: 0
                  param: "{{tools.irParam}}"

  exposes:
    - type: rest
      port: 8102
      namespace: reolink-rest
      resources:
        - path: /v1/device/info
          name: device-info
          description: "Get device information"
          operations:
            - method: GET
              name: get-device-info
              description: "Get camera device information"
              call: "reolink.get-device-info"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9102
      namespace: reolink-mcp
      transport: http
      tools:
        - name: get-device-info
          description: "Get Reolink camera device information"
          hints:
            readOnly: true
            openWorld: false
          call: "reolink.get-device-info"
          outputParameters:
            - type: object
              mapping: "$."
