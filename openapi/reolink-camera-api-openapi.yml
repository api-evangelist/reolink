components:
  parameters:
    Token:
      name: token
      in: path
      required: true
      description: Authentication token obtained from the Login command
      schema:
        type: string
  schemas:
    LoginRequest:
      type: object
      required:
        - cmd
        - action
        - param
      properties:
        cmd:
          type: string
          enum:
            - Login
        action:
          type: integer
          enum:
            - 0
        param:
          type: object
          required:
            - User
          properties:
            User:
              type: object
              required:
                - userName
                - password
              properties:
                userName:
                  type: string
                  description: Username for authentication
                password:
                  type: string
                  description: Password for authentication
    LoginResponse:
      type: object
      properties:
        cmd:
          type: string
        code:
          type: integer
        value:
          type: object
          properties:
            Token:
              type: object
              properties:
                leaseTime:
                  type: integer
                  description: Token validity duration in seconds
                name:
                  type: string
                  description: Authentication token string
    CommandRequest:
      type: object
      required:
        - cmd
        - action
      properties:
        cmd:
          type: string
          description: The API command name
        action:
          type: integer
          description: Action type (0 for get, 1 for set)
        param:
          type: object
          description: Command-specific parameters
    CommandResponse:
      type: object
      properties:
        cmd:
          type: string
          description: The command that was executed
        code:
          type: integer
          description: Response code (0 for success)
        value:
          type: object
          description: Command-specific response data
        error:
          type: object
          properties:
            rspCode:
              type: integer
              description: Error response code
            detail:
              type: string
              description: Error detail message
    ChannelRequest:
      type: object
      required:
        - cmd
        - action
        - param
      properties:
        cmd:
          type: string
          description: The API command name
        action:
          type: integer
          description: Action type (0 for get)
        param:
          type: object
          required:
            - channel
          properties:
            channel:
              type: integer
              description: Camera channel number (starting from 0)
    DevInfoResponse:
      type: object
      properties:
        cmd:
          type: string
        code:
          type: integer
        value:
          type: object
          properties:
            DevInfo:
              type: object
              properties:
                B485:
                  type: integer
                IOInputNum:
                  type: integer
                IOOutputNum:
                  type: integer
                audioNum:
                  type: integer
                buildDay:
                  type: string
                cfgVer:
                  type: string
                channelNum:
                  type: integer
                detail:
                  type: string
                diskNum:
                  type: integer
                firmVer:
                  type: string
                frameworkVer:
                  type: integer
                hardVer:
                  type: string
                model:
                  type: string
                name:
                  type: string
                pakSuffix:
                  type: string
                serial:
                  type: string
                type:
                  type: string
                wifi:
                  type: integer
    PtzCtrlRequest:
      type: object
      required:
        - cmd
        - action
        - param
      properties:
        cmd:
          type: string
          enum:
            - PtzCtrl
        action:
          type: integer
          enum:
            - 0
        param:
          type: object
          required:
            - channel
            - op
          properties:
            channel:
              type: integer
              description: Camera channel number
            op:
              type: string
              description: >-
                PTZ operation to perform
              enum:
                - Stop
                - Left
                - Right
                - Up
                - Down
                - LeftUp
                - LeftDown
                - RightUp
                - RightDown
                - ZoomInc
                - ZoomDec
                - FocusInc
                - FocusDec
                - ToPos
                - Auto
            speed:
              type: integer
              description: Movement speed (1-64)
              minimum: 1
              maximum: 64
            id:
              type: integer
              description: Preset ID for ToPos operation
    SearchRequest:
      type: object
      required:
        - cmd
        - action
        - param
      properties:
        cmd:
          type: string
          enum:
            - Search
        action:
          type: integer
          enum:
            - 0
        param:
          type: object
          required:
            - Search
          properties:
            Search:
              type: object
              required:
                - channel
                - onlyStatus
                - streamType
                - StartTime
                - EndTime
              properties:
                channel:
                  type: integer
                onlyStatus:
                  type: integer
                  description: 0 for full results, 1 for status only
                streamType:
                  type: string
                  enum:
                    - main
                    - sub
                StartTime:
                  type: object
                  properties:
                    year:
                      type: integer
                    mon:
                      type: integer
                    day:
                      type: integer
                    hour:
                      type: integer
                    min:
                      type: integer
                    sec:
                      type: integer
                EndTime:
                  type: object
                  properties:
                    year:
                      type: integer
                    mon:
                      type: integer
                    day:
                      type: integer
                    hour:
                      type: integer
                    min:
                      type: integer
                    sec:
                      type: integer
    SearchResponse:
      type: object
      properties:
        cmd:
          type: string
        code:
          type: integer
        value:
          type: object
          properties:
            SearchResult:
              type: object
              properties:
                channel:
                  type: integer
                Status:
                  type: array
                  items:
                    type: object
                    properties:
                      year:
                        type: integer
                      mon:
                        type: integer
                      table:
                        type: string
                        description: Bitmask of days with recordings
  securitySchemes:
    tokenAuth:
      type: apiKey
      in: query
      name: token
      description: >-
        Authentication token obtained from the Login command. Pass as a
        query parameter on all requests after authentication.
security:
  - tokenAuth: []
tags:
  - name: Authentication
    description: Login, logout, and session token management
  - name: System
    description: Device information, maintenance, time settings, firmware, and storage
  - name: Security
    description: User management and access control
  - name: Network
    description: Network configuration, WiFi, DDNS, NTP, email, FTP, and push notifications
  - name: Video
    description: Image quality, OSD, ISP settings, privacy masks, and snapshot capture
  - name: Encoding
    description: Video stream encoding parameters and compression settings
  - name: Recording
    description: Recording schedules, search, and playback
  - name: PTZ
    description: Pan-tilt-zoom control, presets, patrols, and calibration
  - name: Alarm
    description: Motion detection, audio alarms, and detection zone configuration
  - name: LED
    description: Infrared, white light, and power indicator LED control
  - name: AI
    description: AI-powered object detection, auto-tracking, and autofocus
