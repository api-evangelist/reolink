        type: JSONLD
    description: >-
      The Reolink Camera HTTP API provides a JSON-based interface for controlling
      and configuring Reolink IP cameras and NVRs. All commands are sent as HTTP
      POST requests to the /cgi-bin/api.cgi endpoint. The API covers 11 functional
      modules including authentication, system management, security, network
      configuration, video and image settings, encoding, recording and playback,
      PTZ control, alarm and motion detection, LED control, and AI-powered object
      detection with auto-tracking. Authentication uses a token-based session
      system obtained via the Login command.
